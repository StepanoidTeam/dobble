<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Page Not Found</title>

    <link rel="stylesheet" href="./style.css" />

    <style>
      .btn-primary {
        text-decoration: none;
      }

      .container-404 {
        width: clamp(80px, 60vw, 400px);
      }

      .logo-404 {
        width: clamp(80px, 60vw, 400px);
        height: auto;
      }

      .message-404 {
        /* // */
      }

      .message-bubble {
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <!-- ===== background layer ===== -->
    <div class="bg-layer" aria-hidden="true">
      <div class="bg-gradient"></div>
      <div class="bg-pattern"></div>
    </div>

    <div class="screen">
      <div class="container-404 flex-col gap-4 items-center">
        <div class="logo-container">
          <img class="logo-404" src="./images/404.png" alt="404" />
        </div>
        <div>
          <h1
            class="message-bubble text-center text-outline"
            data-text="Ты не туда ткнул, человечек."
          >
            Ты не туда ткнул, человечек.
          </h1>
          <!-- <h1 class="message-bubble">Глаз всё видел. Страницы — нет.</h1> -->
        </div>
        <p class="message-404">
          <!-- Я всё видел. Даже то, что ты искал. -->
          Рука знает, куда ты хотел, но не пускает.
        </p>

        <a class="btn-primary text-center" href="./index.html">Назад</a>
      </div>
    </div>
  </body>
</html>
